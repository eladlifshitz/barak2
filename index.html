<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של ברק לב שלם</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #fdfcfb; --white: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; overflow-x: hidden; }
        
        /* Nav */
        nav { background: var(--primary); color: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 65px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; cursor: pointer; }
        
        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); margin: 40px 0 20px; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* Hero */
        .hero { display: flex; align-items: center; gap: 40px; padding: 40px 0; }
        .hero-img { flex: 0 0 300px; }
        .hero-img img { width: 100%; border-radius: 15px; box-shadow: 10px 10px 0 var(--accent); }
        .hero-text { flex: 1; }

        /* Filter Bar */
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .filter-btn { background: #ddd; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .filter-btn.active { background: var(--accent); color: white; }

        /* Cards */
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; display: flex; flex-direction: column; transition: 0.3s; height: 100%; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; flex-grow: 1; }
        .tag { display: inline-block; background: #fff3e0; color: var(--accent); padding: 3px 10px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; margin-left: 5px; }
        .source-tag { font-size: 0.8rem; color: #888; margin-top: 10px; font-style: italic; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 20px; overflow-y: auto; padding: 40px; position: relative; }
        
        /* Comments */
        .comment-section { margin-top: 30px; background: #f9f9f9; padding: 20px; border-radius: 10px; }
        .comment-bubble { background: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .comment-form input, .comment-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; }
            .hero-img { flex: none; width: 200px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="showPage('home')">ברק לב שלם</div>
    <div class="nav-links">
        <a onclick="showPage('home')">בית</a>
        <a onclick="showPage('gallery')">גלריה</a>
        <a onclick="showPage('texts')">סיפורים</a>
        <a onclick="showPage('jokes')">בדיחות</a>
        <a onclick="showPage('about')">אודות</a>
    </div>
</nav>

<div class="container" id="main-content"></div>

<div id="item-modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span onclick="closeModal()" style="position:absolute; top:15px; left:15px; font-size:30px; cursor:pointer">×</span>
        <span onclick="copyShareLink()" style="position:absolute; top:15px; right:15px; cursor:pointer; background:#eee; padding:5px 10px; border-radius:10px; font-size:0.8rem">🔗 העתק קישור</span>
        <div id="modal-body"></div>
        <div id="comment-area"></div>
    </div>
</div>

<script>
    const JOKES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSR74JGStqevOMg4uFKqudbSRFEQVRisiEgSwTuxnLjsTUx7TShIVuzPkdRgOZiJq8Pz3H-zoa_3mK3/pub?gid=0&single=true&output=csv';
    const PHOTOS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSevdjPZljQNazIav8vcVOszHVu5iKOA-AtYUjwhZGuZUibJpjgnJHC_tsrZY11p9aAE_iQytePZsAZ/pub?output=csv';
    const TEXTS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSXdGMnIRS-ydFn4BRfngLIAbdveYx7L7eS96kCvpruVDca1-uGk3qyQY9Nh9C_eTpbjKoojzB2zlFn/pub?gid=1983290067&single=true&output=csv';
    const COMMENTS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLoH5kw3YDw4HGqSflNsJfe-Gaq34n-5916WzKs-wFlAiCOUiit6ZqmkUiKprnAyJ6ezB0bwQhkGej/pub?output=csv';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqak-Ai_5xyULt8tV0cjexgd-yp7K6ACOTAJXYhdGdaG3v_xqD-vcAS-dgnjBnRyVr/exec';

    let data = { jokes: [], photos: [], texts: [], comments: [] };
    let currentOpenItem = null;

    async function init() {
        const [j, p, t, c] = await Promise.all([
            fetchCSV(JOKES_URL, true), fetchCSV(PHOTOS_URL, false), fetchCSV(TEXTS_URL, true), fetchCSV(COMMENTS_URL, false)
        ]);
        
        data.jokes = j;
        data.photos = p.slice(1).map(r => ({ title: r[0], id: r[1], category: r[2] || 'כללי' }));
        data.texts = t;
        
        data.comments = c.slice(1).filter(r => r[5] === "YES" || r[6] === "YES");

        showPage('home');
    }

    function fetchCSV(url, header) {
        return new Promise(res => Papa.parse(url, { download: true, header, skipEmptyLines: true, complete: r => res(r.data) }));
    }

    function showPage(pageId) {
        const container = document.getElementById('main-content');
        window.scrollTo(0,0);
        if (pageId === 'home') renderHome(container);
        else if (pageId === 'gallery') renderArchive(container, 'גלריה', data.photos, 'category', renderPhotoCard);
        else if (pageId === 'texts') renderArchive(container, 'סיפורים ויצירות', data.texts, 'Type', renderTextCard);
        else if (pageId === 'jokes') renderArchive(container, 'מאגר הבדיחות', data.jokes, 'Categories', renderJokeCard);
        else if (pageId === 'about') renderAbout(container);
    }

    function renderHome(container) {
        const randomJoke = data.jokes[Math.floor(Math.random() * data.jokes.length)];
        const samplePhotos = [...data.photos].sort(() => 0.5 - Math.random()).slice(0, 4);
        const sampleTexts = [...data.texts].sort(() => 0.5 - Math.random()).slice(0, 3);

        container.innerHTML = `
            <div class="hero">
                <div class="hero-img"><img src="https://lh3.googleusercontent.com/d/${data.photos[0]?.id}"></div>
                <div class="hero-text">
                    <h1>ברק לב שלם</h1>
                    <p>ברוכים הבאים לאתר הזיכרון של ברק. מקום שבו אספנו את המילים שלו, החיוך שלו והבדיחות שתמיד ידע לספר.</p>
                </div>
            </div>
            <div class="section-header"><h3>בדיחה אקראית של ברק</h3><button class="filter-btn" onclick="showPage('jokes')">לכל הבדיחות</button></div>
            <div style="background:white; padding:30px; border-radius:15px; border-right:5px solid var(--accent); margin-bottom:40px; font-size:1.4rem; font-style:italic;">
                "${randomJoke ? randomJoke['Joke Content'] : 'טוען בדיחה...'}"
            </div>
            <div class="section-header"><h3>מהגלריה</h3><button class="filter-btn" onclick="showPage('gallery')">הצג הכל</button></div>
            <div class="grid">${samplePhotos.map(renderPhotoCard).join('')}</div>
            <div class="section-header"><h3>סיפורים ויצירות</h3><button class="filter-btn" onclick="showPage('texts')">הצג הכל</button></div>
            <div class="grid">${sampleTexts.map(renderTextCard).join('')}</div>
        `;
    }

    function renderArchive(container, title, items, filterKey, cardFunc) {
        let cats = [];
        items.forEach(i => (i[filterKey] || 'כללי').split(',').forEach(c => cats.push(c.trim())));
        const uniqueCats = [...new Set(cats)];

        container.innerHTML = `
            <h2>${title}</h2>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterData(this, 'all')">הכל</button>
                ${uniqueCats.map(c => `<button class="filter-btn" onclick="filterData(this, '${c}')">${c.replace('היצירה של ברק - ', '')}</button>`).join('')}
            </div>
            <div class="grid" id="archive-grid">${items.map((item, index) => cardFunc(item, index)).join('')}</div>
        `;
    }

    function filterData(btn, cat) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('#archive-grid > .card').forEach(card => {
            const cardCats = card.getAttribute('data-cat');
            card.style.display = (cat === 'all' || cardCats.includes(cat)) ? 'flex' : 'none';
        });
    }

    function renderPhotoCard(p) {
        return `<div class="card" data-cat="${p.category}" onclick="openItem('photo', '${p.id}')">
            <img src="https://lh3.googleusercontent.com/d/${p.id}">
            <div class="card-content"><span class="tag">${p.category}</span><p>${p.title}</p></div>
        </div>`;
    }

    function renderTextCard(t) {
        return `<div class="card" data-cat="${t.Type}" onclick="openItem('text', '${t.Link}')">
            <div class="card-content"><span class="tag">${t.Type.replace('היצירה של ברק - ', '')}</span><h4>${t.Title}</h4><p>${t.Author || ''}</p></div>
        </div>`;
    }

    function renderJokeCard(j, index) {
        return `<div class="card" data-cat="${j.Categories}" onclick="openItem('joke', '${index}')">
            <div class="card-content">
                ${(j.Categories || '').split(',').map(c => `<span class="tag">${c.trim()}</span>`).join('')}
                <p>"${j['Joke Content']}"</p>
                <div class="source-tag">${j.Source || 'בדיחה שברק אהב'}</div>
            </div>
        </div>`;
    }

    async function openItem(type, id) {
        currentOpenItem = {type, id};
        const body = document.getElementById('modal-body');
        document.getElementById('item-modal').style.display = 'flex';
        body.innerHTML = 'טוען...';

        if(type === 'photo') body.innerHTML = `<img src="https://lh3.googleusercontent.com/d/${id}" style="width:100%; border-radius:10px;">`;
        else if(type === 'joke') {
            const joke = data.jokes[id];
            body.innerHTML = `<h3>בדיחה</h3><p style="font-size:1.4rem;">"${joke['Joke Content']}"</p><div class="source-tag">${joke.Source || ''}</div>`;
        } else if(type === 'text') {
            const res = await fetch('texts/' + id);
            body.innerHTML = res.ok ? await res.text() : 'הקובץ לא נמצא';
        }
        renderComments(id);
    }

    function renderComments(itemId) {
        const area = document.getElementById('comment-area');
        const filtered = data.comments.filter(c => c[3] === itemId);
        area.innerHTML = `<div class="comment-section">
            <h4>תגובות וזכרונות (${filtered.length})</h4>
            ${filtered.map(c => `<div class="comment-bubble"><strong>${c[0]} (${c[1]}):</strong><p>${c[2]}</p></div>`).join('')}
            <div class="comment-form">
                <input type="text" id="c-name" placeholder="שם מלא">
                <input type="text" id="c-rel" placeholder="קשר לברק">
                <textarea id="c-content" placeholder="כתבו מילה חמה..."></textarea>
                <button class="submit-btn" onclick="submitComment('${itemId}')">שלח תגובה</button>
            </div>
        </div>`;
    }

    async function submitComment(itemId) {
        const payload = {
            name: document.getElementById('c-name').value,
            relation: document.getElementById('c-rel').value,
            content: document.getElementById('c-content').value,
            item_id: itemId
        };
        try {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("תודה! התגובה נשלחה ותופיע לאחר אישור.");
            closeModal();
        } catch(e) { alert("שגיאה בשליחה"); }
    }

    function closeModal() { document.getElementById('item-modal').style.display = 'none'; }
    function copyShareLink() {
        const link = window.location.origin + window.location.pathname + "#" + currentOpenItem.type + "=" + currentOpenItem.id;
        navigator.clipboard.writeText(link);
        alert("הקישור הועתק!");
    }
    
    function renderAbout(container) {
        container.innerHTML = `<div class="container" style="max-width:700px"><h2>אודות האתר</h2><p>כאן תוכל להוסיף את הטקסט שרצית על האתר ועל ברק.</p></div>`;
    }

    window.onload = init;
</script>
</body>
</html>
